<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Calculator.css">
    <script src="app.js" defer></script>
</head>

<body>

     <button class="sub">☰</button>

    <div class="side-menu">
        <div class="button-section">
    <div class="logo"><img src="image/ChatGPT Image Jul 1, 2026, 10_50_34 AM.png" alt="logo"></div>

    <div class="line l1 ">
    <button class="invoice inv ">Invoice</button>
    </div>
    
    <div class="line l2">
    <button class="invoice Receipt">Receipt</button>
    </div>

        
    <div class="line l3 active">
    <button class="invoice Calculator active">Calculator</button>
    </div>

    
    <div class="line l4">
    <button class="invoice Converter">Converter</button>
    </div>

    
    <div class="line l5">
    <button class="invoice Sales">Sales list</button>
    </div>

        
    <div class="line l6">
    <button class="invoice games">Games</button>
    </div>


</div>
    </div>

    <main class="app">
        <section class="calculator" aria-label="simple calculator interface">
            <input type="text" class="display" value="" aria-label="calculator display" placeholder="0" readonly>

            <div class="keys" aria-label="calculator keys">

                <button class="key action">AC</button>
                <button class="key action">DEL</button>
                <button class="key action">%</button>
                <button class="key operator">/</button>
 
                <button class="key">7</button>
                <button class="key">8</button>
                <button class="key">9</button>
                <button class="key operator">x</button>

                <button class="key">4</button>
                <button class="key">5</button>
                <button class="key">6</button>
                <button class="key operator">-</button>

                <button class="key">1</button>
                <button class="key">2</button>
                <button class="key">3</button>
                <button class="key operator">+</button>

                <button class="key span-2">0</button>
                <button class="key">.</button>
                <button class="key equals">=</button>



            </div>
        </section>
    </main>
    <script src="Calculator.js"></script>
</body>

</html>
