<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Sales Record</title>
    <link rel="stylesheet" href="Sales.css">
</head>
<body>

    <button class="sub">☰</button>

       <div class="button-section">
    <div class="logo"><img src="image/ChatGPT Image Jul 1, 2026, 10_50_34 AM.png" alt="logo"></div>

    <div class="line l1 ">
    <button class="invoice inv ">Invoice</button>
    </div>
    
    <div class="line l2">
    <button class="invoice Receipt">Receipt</button>
    </div>

        
    <div class="line l3 ">
    <button class="invoice Calculator active">Calculator</button>
    </div>

    
    <div class="line l4 ">
    <button class="invoice Converter">Converter</button>
    </div>

    
    <div class="line l5 active">
    <button class="invoice Sales">Sales list</button>
    </div>

        
    <div class="line l6">
    <button class="invoice games">Games</button>
    </div>


</div>
    </div>   

<div class="container">

    <h1>Daily Sales Record</h1>

    <div class="form">

        <input type="date" id="date">

        <input type="text" id="product" placeholder="Product Name">

        <input type="number" id="qty" placeholder="Quantity">

        <input type="number" id="price" placeholder="Price Per Unit">

        <button id="saveBtn">Save Sale</button>

    </div>

    <div class="summary">

        <h2>Total Sales Today</h2>

        <h1>₦<span id="todayTotal">0.00</span></h1>

    </div>

    <table>

        <thead>

            <tr>
                <th>Date</th>
                <th>Product</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
                <th>Action</th>
            </tr>

        </thead>

        <tbody id="salesTable">

        </tbody>

    </table>

    <button id="clearBtn">Clear All Records</button>

</div>

<script src="Sales.js"></script>

</body>
</html>
